name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - '**'

jobs:
  test-and-build:
    name: Lint, Type Check, and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint Check
        run: pnpm run lint

      - name: Type Check (tsc)
        # Runs tsc in all packages to ensure strict type compliance without emitting compiled files
        run: pnpm -r exec tsc --noEmit

      - name: Build Applications
        run: pnpm run build
